<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>File On Cloud — Auth</title>
  <link rel="stylesheet" href="style.css" />
  <script src="theme.js"></script>
</head>
<body>
  <!-- The Top Navigation Bar -->
  <header class="nav">
    <a href="index.html" class="brand">
      <img src="backup-file.png" height="32" width="32" alt="backup" class="brand-img" style="border-radius: 6px;">
      <span>Files on Cloud</span>
    </a>
    <div class="nav-cta" style="display: flex; align-items: center; gap: 8px;">
      <button class="btn btn-ghost theme-toggle" aria-label="Toggle Theme" style="padding: 6px;"></button>
      <a href="index.html" class="btn btn-ghost" id="backBtn">← Back</a>
    </div>
  </header>

  <section class="workspace" style="margin-top: 64px; min-height: 50vh;">
    <div class="panel card" style="max-width: 400px; margin: 0 auto;">
      
      <!-- The Login Form Section -->
      <div id="loginBlock">
        <div class="panel-head">
          <h3>Login</h3>
        </div>
        <form id="loginForm" class="grid-2" style="grid-template-columns: 1fr; margin-top: 0;">
          <div class="field">
            <span class="field-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
            </span>
            <input type="email" id="loginEmail" placeholder="Email" required />
          </div>
          <div class="field">
            <span class="field-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </span>
            <input type="password" id="loginPassword" placeholder="Password" required />
          </div>
          <button type="submit" id="loginSubmit" class="btn btn-primary btn-block btn-lg" style="margin-top: 12px;">Login</button>
        </form>
        <p class="muted" style="text-align: center; margin-top: 16px;">Don't have an account? <a href="#" id="showSignup" style="color: var(--primary);">Sign up</a></p>
      </div>

      <!-- The New Account Sign Up Section -->
      <div id="signupBlock" style="display: none;">
        <div class="panel-head">
          <h3>Sign Up</h3>
        </div>
        <form id="signupForm" class="grid-2" style="grid-template-columns: 1fr; margin-top: 0;">
          <div class="field">
            <span class="field-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            </span>
            <input type="text" id="signupUsername" placeholder="Username" required />
          </div>
          <div class="field">
            <span class="field-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
            </span>
            <input type="email" id="signupEmail" placeholder="Email" required />
          </div>
          <div class="field">
            <span class="field-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </span>
            <input type="password" id="signupPassword" placeholder="Password (min 6 chars)" required />
          </div>
          <button type="submit" id="signupSubmit" class="btn btn-primary btn-block btn-lg" style="margin-top: 12px;">Sign Up</button>
        </form>
        <p class="muted" style="text-align: center; margin-top: 16px;">Already have an account? <a href="#" id="showLogin" style="color: var(--primary);">Login</a></p>
      </div>

      <div id="authFeedback" class="muted" style="display: none; margin-top: 16px; text-align: center; font-weight: 500;"></div>
    </div>
  </section>

  <!-- The Bottom Footer -->
  <footer class="footer">
    <div class="footer-container">
      <div class="footer-section contact-dev">
        <h3>💻 Contact Developer</h3>
        <div class="social-links">
          <a href="https://www.linkedin.com/in/priyanshu-kumar-15799a293/" target="_blank" rel="noopener noreferrer">
            <img src="linkedin.png" alt="linkedin"> LinkedIn
          </a>
          <a href="https://github.com/priyansh13-c" target="_blank" rel="noopener noreferrer">
            <img src="github.png" alt="github"> GitHub
          </a>
        </div>
      </div>
      <div class="footer-section brand-info">
        <div class="brand-logo">
          <span class="brand-mark sm">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.5 19a4.5 4.5 0 1 0-1.4-8.78A6 6 0 0 0 4 12.5 4.5 4.5 0 0 0 6.5 19"/></svg>
          </span>
          <span class="brand-text">Files on Cloud</span>
        </div>
        <p class="copyright">&copy; <span id="year"></span> Files on Cloud. Made with ❤️</p>
      </div>
    </div>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    const API_BASE = "";

    const urlParams = new URLSearchParams(window.location.search);
    const startMode = urlParams.get('mode') || 'login';

    const loginBlock = document.getElementById('loginBlock');
    const signupBlock = document.getElementById('signupBlock');
    const showSignup = document.getElementById('showSignup');
    const showLogin = document.getElementById('showLogin');
    const authFeedback = document.getElementById('authFeedback');

    const loginForm = document.getElementById('loginForm');
    const signupForm = document.getElementById('signupForm');

    const setMode = (mode) => {
        if (mode === 'signup') {
            loginBlock.style.display = 'none';
            signupBlock.style.display = 'block';
        } else {
            loginBlock.style.display = 'block';
            signupBlock.style.display = 'none';
        }
        authFeedback.style.display = 'none';
    };

    setMode(startMode);

    showSignup.addEventListener('click', (e) => {
        e.preventDefault();
        setMode('signup');
    });

    showLogin.addEventListener('click', (e) => {
        e.preventDefault();
        setMode('login');
    });

    function showFeedback(message, type) {
        authFeedback.textContent = message;
        authFeedback.style.color = type === 'error' ? 'var(--danger)' : 'var(--primary)';
        authFeedback.style.display = 'block';
    }

    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        const submitBtn = document.getElementById('loginSubmit');

        submitBtn.disabled = true;
        submitBtn.textContent = 'Logging in...';
        authFeedback.style.display = 'none';

        try {
            const res = await fetch(`${API_BASE}/api/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await res.json();
            if (res.ok) {
                localStorage.setItem('authToken', data.token);
                window.location.href = 'index.html';
            } else {
                showFeedback(data.error || 'Login failed', 'error');
            }
        } catch (err) {
            showFeedback('Login failed. Please try again.', 'error');
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Login';
        }
    });

    signupForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('signupUsername').value;
        const email = document.getElementById('signupEmail').value;
        const password = document.getElementById('signupPassword').value;
        const submitBtn = document.getElementById('signupSubmit');

        submitBtn.disabled = true;
        submitBtn.textContent = 'Creating account...';
        authFeedback.style.display = 'none';

        try {
            const res = await fetch(`${API_BASE}/api/auth/signup`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, password })
            });

            const data = await res.json();
            if (res.ok) {
                localStorage.setItem('authToken', data.token);
                window.location.href = 'index.html';
            } else {
                showFeedback(data.error || 'Signup failed', 'error');
            }
        } catch (err) {
            showFeedback('Signup failed. Please try again.', 'error');
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Sign Up';
        }
    });
  </script>
</body>
</html>
